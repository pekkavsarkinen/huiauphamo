<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>HUIAU PHASMOTTELUA - BPM MATCH EDITION</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #020202; color: #fff; margin: 0; padding: 10px; line-height: 1.2; font-size: 11px; }
        .header { text-align: center; color: #ff0000; font-weight: bold; font-size: 1.6rem; text-transform: uppercase; padding-bottom: 2px; }
        .mimic-warn { text-align: center; color: #ff00ff; font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; text-shadow: 0 0 10px #ff00ff; }
        .mimic-warn span { display: inline-block; animation: wave 1.5s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .card { background: #111; padding: 8px; border-radius: 6px; border: 1px solid #333; text-align: center; }
        .bpm-value { font-size: 1.8rem; color: #2ecc71; font-family: 'Courier New', monospace; font-weight: bold; }
        .bpm-btn { background: #ffaa00; border: none; color: #000; padding: 10px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; text-transform: uppercase; }
        h2 { font-size: 0.7rem; color: #aaa; text-transform: uppercase; margin: 10px 0 5px; border-left: 3px solid #ffaa00; padding-left: 8px; }
        .btn-row { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px; }
        button { background: #1a1a1a; border: 1px solid #333; color: #999; padding: 5px 8px; cursor: pointer; border-radius: 3px; font-size: 0.65rem; transition: 0.1s; }
        button.active { background: #ffaa00; color: #000; font-weight: bold; }
        button.los-btn { background: #2c3e50; color: #ecf0f1; border-color: #34495e; }
        button.los-active { background: #3498db; color: #fff; border-color: #fff; }
        button.elim-btn { background: #331111; color: #ff8888; border-color: #442222; }
        button.elim-active { background: #ff4444; color: #fff; border-color: #fff; }
        
        /* BPM Korostus */
        .bpm-match { background: rgba(46, 204, 113, 0.2) !important; box-shadow: inset 0 0 10px rgba(46, 204, 113, 0.4); border-left: 4px solid #2ecc71 !important; }
        
        .impossible { opacity: 0.05; filter: grayscale(100%); pointer-events: none; }
        .info-btn { width: 35px; height: 30px; background: #3498db; border-radius: 4px; text-align: center; line-height: 30px; cursor: pointer; font-weight: bold; color: white; border: none; }
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 20px; border: 2px solid #ffaa00; z-index: 100; width: 92%; max-width: 600px; border-radius: 10px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 50px #000; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99; }
        .m-header { color: #ff4444; font-weight: bold; font-size: 0.9rem; text-transform: uppercase; display: block; margin-top: 15px; border-bottom: 1px solid #333; }
        .m-body { color: #eee; font-size: 0.85rem; background: #151515; padding: 12px; border-radius: 4px; margin-top: 5px; white-space: pre-wrap; line-height: 1.5; }
        .audio-lab { background: #1a1122; padding: 10px; border: 1px solid #9b59b6; border-radius: 6px; margin-top: 10px; }
        .audio-test-btn { background: #9b59b6; color: white; width: 100%; padding: 8px; margin-bottom: 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; }
        .egg-link { display: block; text-align: center; margin-top: 25px; color: #ff00ff; text-decoration: none; font-size: 0.9rem; font-weight: bold; transition: 0.3s; text-shadow: 0 0 5px rgba(255, 0, 255, 0.5); }
    </style>
</head>
<body>

    <div class="header">HUIAU PHASMOTTELUA</div>

    <div class="grid-main">
        <div class="card">

            <button onclick="stopAudio(); resetAll();" style="background:#ff4444; color:white; border:none; padding:10px; border-radius:4px; font-weight:bold; cursor:pointer; width:100%; margin-bottom:5px;">NOLLAA KAIKKI</button>
            <div style="display:flex; gap:3px;">
                <button style="flex:1" id="male-btn" onclick="setGender('M')">ÄIJJÄ</button>

<script>
    const mimicText = "Se on Mimic. Aina.....";
    const mimicContainer = document.getElementById('mimic-text');
    mimicText.split('').forEach((char, i) => {
        const span = document.createElement('span');
        span.innerText = char === ' ' ? '\u00A0' : char;
        span.style.animationDelay = (i * 0.1) + 's';
        mimicContainer.appendChild(span);
    });

    const ghosts = [
        { n: "Banshee", ev: ["Ultraviolet", "Ghost Orb", "D.O.T.S"], h: "50%*", g: "F", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "BANSHEE INFO:\n\n- METSÄSTYSRAJA: 50%. Kuitenkin Banshee tarkistaa vain kohteensa (Target) mielenterveyden. Jos kohde on talon ulkopuolella, se käyttää normaalia 50% keskiarvosanity-rajaa.\n\n- KOHDE: Valitsee yhden pelaajan kohteekseen pelin alussa. Se pysyy samassa kohteessa, kunnes kohde kuolee tai pelaajat poistuvat talosta.\n\n- METSÄSTYSKÄYTTÄYTYMINEN: Metsästyksen aikana Banshee välittää VAIN kohteestaan. Voi kävellä muiden pelaajien läpi tappamatta heitä, jos se ei ole vielä saavuttanut kohdettaan.\n\n- ERIKOISKYKY (Siren Wail): Uniikki huuto, joka voidaan kuulla vain parabolisen mikrofonin kautta. Se kuulostaa kimeältä, vaimenevasta kirkaisulta.\n\n- VAELTAMINEN (Roaming): Banshee vaeltaa kohteensa luokse huomattavasti useammin kuin muut haamut.\n\n- GHOST EVENTIT: Tekee mieluummin laulavia ghost eventtejä. Jos se tekee laulueventin ja olet sen kohde, menetät 15% mielenterveyttä (normaali 10%).\n\n- RISTI (Crucifix): Herkkä ristille. Ristin vaikutusalue on Bansheelle 5 METRIÄ (muilla 3m).\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Dayan", ev: ["Ghost Orb", "Ghost Writing", "D.O.T.S"], h: "50%", g: "F", los: false, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "DAYAN INFO:\n\n- AINA Naispuolinen haamomalli.\n\n- AKTIVISUUS: Pimeässä aktiivisuus kasvaa +25%.\n\n- VALOT JA SÄHKÖT: Rakastaa sammuttaa valoja ja sähköjä huomattavasti useammin kuin muut haamut (poislukien Mare). Voi sammuttaa sähköt heti kun ne laitetaan päälle.\n\n- NOPEUS: Liikkuu vakiovauhdilla (1.7 m/s / 120 BPM), mutta on passiivisempi valoisissa tiloissa." },
        { n: "Demon", ev: ["Ultraviolet", "Ghost Writing", "Freezing"], h: "70%+", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "DEMON INFO:\n\n- AGGRESSIIVISUUS: Pelin aggressiivisin haamu. Voi hyökätä milloin vain (jopa 100% sanitylla).\n\n- HUNT-RAJA: Normaali raja on 70%, mutta sen erikoiskyky voi laukaista metsästyksen milloin vain.\n\n- COOLDOWN: Metsästysten välinen tauko on vain 20 sekuntia (muilla 25s).\n\n- SUITSUKE (Smudge Stick): Estää Demonin metsästyksen vain 60 sekunniksi (muilla 90s).\n\n- RISTI (Crucifix): Vaikutusalue on 5 METRIÄ (muilla 3m).\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Deogen", ev: ["Spirit Box", "Ghost Writing", "D.O.T.S"], h: "40%", g: "ALL", los: false, audio: [{label: "Kaukana (3.0 m/s / 210 BPM)", speed: 3.0, bpm: 210}, {label: "Lähellä (0.4 m/s / 28 BPM)", speed: 0.4, bpm: 28}], det: "DEOGEN INFO:\n\n- SIJAINTI: Tietää pelaajien sijainnin AINA metsästyksen aikana. Siltä ei voi piiloutua.\n\n- NOPEUS: Nopeus määräytyy etäisyyden mukaan. Kaukana se on todella nopea (3.0 m/s / 210 BPM), mutta kun se on lähellä (alle 2.5m), se hidastuu etanan vauhtiin (0.4 m/s / 28 BPM).\n\n- SPIRIT BOX: Uniikki 'raskas hengitys' -vastaus, kun olet aivan haamun vieressä (alle 1m).\n\n- TAKTIIKKA: Älä koskaan yritä piiloutua kaappiin, vaan kierrä jotain esinettä tai pöytää." },
        { n: "Gallu", ev: ["EMF 5", "Ghost Writing", "Freezing"], h: "50%*", g: "ALL", los: true, audio: [{label: "Normal (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}, {label: "Enraged (1.96 m/s / 138 BPM)", speed: 1.96, bpm: 138}, {label: "Weakened (1.36 m/s / 96 BPM)", speed: 1.36, bpm: 96}], det: "GALLU INFO:\n\nTILAT (STATES): Kiertää kolmen tilan välillä (Normal > Enraged > Weakened).\n\nNORMAL STATE (Aloitustila):\n- Nopeus: 1.7 m/s (120 BPM). Hunt-raja: 50%.\n- Siirtyy Enraged-tilaan, jos astuu suolaan (2s viiveellä), suitsutetaan tai se käyttää ristiä (välitön vaihto).\n\nENRAGED STATE:\n- Nopeus: 1.96 m/s (138 BPM). Hunt-raja: 60%.\n- Suitsukesokeus: 4s. Ristin kantama: -2m.\n- Ei reagoi suolaan.\n- Pysyy tässä tilassa huntin loppuun asti, jonka jälkeen siirtyy Weakened-tilaan.\n\nWEAKENED STATE:\n- Nopeus: 1.36 m/s (96 BPM). Hunt-raja: 40%.\n- Suitsukesokeus: 6s. Ristin kantama: +1m.\n- Reagoi suolaan.\n- Palaa Normal-tilaan, jos astuu suolaan (3s viiveellä), suitsutetaan tai se käyttää ristiä (välitön vaihto)." },
        { n: "Goryo", ev: ["EMF 5", "Ultraviolet", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["not_dots_naked"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "GORYO INFO:\n\n- HUNT SANITY: Aloittaa metsästyksen vasta, kun keskimääräinen mielenterveys on 50% tai alempi.\n\n- HUONEEN VAIHTO: Goryo ei voi koskaan vaihtaa suosikkihuonettaan (Favorite Room).\n\n- VAELTAMINEN (Roaming): Goryo ei voi vaeltaa kauas suosikkihuonettaan.\n\n- D.O.T.S. PROJEKTORI: Goryon DOTS-todisteen voi nähdä VAIN videokameran kautta. Sitä ei voi nähdä paljaalla silmällä. Goryo näyttää DOTS-haamun vain silloin, kun huoneessa ei ole pelaajia.\n\n- TAATTU TODISTE: D.O.T.S. on taattu todiste vaikeusasteilla.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Hantu", ev: ["Ultraviolet", "Ghost Orb", "Freezing"], h: "50%", g: "ALL", los: false, tags: ["not_breaker_on"], audio: [{label: "Kylmä (2.7 m/s / 190 BPM)", speed: 2.7, bpm: 190}, {label: "Lämmin (1.4 m/s / 100 BPM)", speed: 1.4, bpm: 100}], det: "HANTU INFO:\n\n- LÄMPÖTILA JA NOPEUS: 2.7 m/s (190 BPM) (0°C tai alempi). 1.4 m/s (100 BPM) (15°C tai korkeampi).\n\n- HENGITYS: Huuruhengitys nähtävissä huntin aikana, jos huone on kylmä.\n\n- SÄHKÖTAULU (Breaker): Ei voi koskaan kytkeä sähkötaulua päälle. Kytkee sen pois päältä 2x useammin.\n\n- LOS: Ei kiihdy koskaan näköyhteydestä." },
        { n: "Jinn", ev: ["EMF 5", "Ultraviolet", "Freezing"], h: "50%", g: "ALL", los: true, tags: ["not_breaker_off"], audio: [{label: "Syöksy (2.5 m/s / 175 BPM)", speed: 2.5, bpm: 175}, {label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "JINN INFO:\n\n- SÄHKÖTAULU: Voimat riippuvaisia siitä. Ei voi kytkeä sähkötaulua pois itse.\n\n- ERIKOISKYKY (Sanity): Voi laskea sanitya 25% välittömästi lähellä olevilta (EMF 2/5 sähkötaululla).\n\n- NOPEUS: Jos sähköt on päällä ja näkee pelaajan, syöksyy 2.5 m/s (175 BPM), kunnes on n. 3m päässä. Normi 1.7 m/s (120 BPM)." },
        { n: "Mare", ev: ["Spirit Box", "Ghost Orb", "Ghost Writing"], h: "40/60%", g: "ALL", los: true, tags: ["not_light_on"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "MARE INFO:\n\n- HUNT SANITY: 60% (pimeä), 40% (valot).\n\n- VALOKYTKIMET: Kyky sammuttaa valot heti kun ne sytytetään. Ei sytytä koskaan itse.\n\n- HUONEEN VAIHTO: Vaihtaa huonetta todennäköisemmin, jos valot on päällä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Moroi", ev: ["Spirit Box", "Ghost Writing", "Freezing"], h: "50%", g: "ALL", los: true, audio: [{label: "Sanity 0% (2.25 m/s / 160 BPM)", speed: 2.25, bpm: 160}, {label: "Sanity 50% (1.5 m/s / 106 BPM)", speed: 1.5, bpm: 106}], det: "MOROI INFO:\n\n- NOPEUS: Riippuu mielenterveydestä. 1.5 m/s (106 BPM) (50% sanity) - 2.25 m/s (160 BPM) (0% sanity).\n\n- KIRCHUS: Kiroaa Spirit Boxin/parabolisen kautta. Tuplaa sanityn laskun.\n\n- SUITSUKE: Vaikutus kestää 6 sekuntia (normaali 4s).\n\n- TAATTU TODISTE: Spirit Box." },
        { n: "Myling", ev: ["EMF 5", "Ultraviolet", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "MYLING INFO:\n\n- ASKELEET: Kuuluvat vain n. 10m päästä huntin aikana.\n\n- PARABOLINEN MIKROFONI: Erittäin aktiivinen, antaa paljon ääniä ja kuiskausvastauksia.\n\n- ERIKOISKYKY: Askeleet vaimenevat nopeammin etäisyyden kasvaessa.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Obake", ev: ["EMF 5", "Ultraviolet", "Ghost Orb"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "OBAKE INFO:\n\n- SORMENJÄLJET: Jättää vain 75% todennäköisyydellä. Häviävät 60 sekunnissa.\n\n- UNIINKI SORMENJÄLKI: 6-sorminen kädenjälki oviin/valokatkaisimiin mahdollista.\n\n- SHAPESHIFT: Huntin aikana 6,25% mahdollisuus muuttaa muotoaan (modelia) välähdyksessä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Obambo", ev: ["EMF 5", "Spirit Box", "Ghost Orb"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "OBAMBO INFO:\n\n- ESINEIDEN HEITTÄMINEN: Heittää kauemmas ja kovempaa. Voi heittää useita esineitä kerralla.\n\n- ASKELEET: Kuuluvat raskaampina ja selkeämmin eri kerroksiin.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Oni", ev: ["EMF 5", "Freezing", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["not_mist_ball"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "ONI INFO:\n\n- AKTIIVISUUS: Erittäin aktiivinen pelaajien lähellä.\n\n- NÄKYVYYS: Välkkyy huntissa vähemmän, on näkyvissä pidempään.\n\n- USVAPALLO: Ei voi koskaan tehdä 'Mist Ball' -eventtiä. Aina fyysinen ilmestyminen.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Onryo", ev: ["Spirit Box", "Ghost Orb", "Freezing"], h: "60%*", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "ONRYO INFO:\n\n- HUNT SANITY: 60% (ilman tulta). Voi metsästää milloin vain, jos sammuttaa tulen.\n\n- TULI: Toimii kuin risti 4m säteellä.\n\n- TULEN JÄLKEEN: Joka 3. sammutettu tuli yrittää laukaista huntin riippumatta sanitysta.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Phantom", ev: ["Spirit Box", "Ultraviolet", "D.O.T.S"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "PHANTOM INFO:\n\n- SANITY: Katsominen laskee mielenterveyttä 0,5% per sekunti.\n\n- VALOKUVA: Jos otat kuvan, haamu katoaa heti, mutta ääni jatkuu. Kuva on tyhjä.\n\n- VAELTAMINEN: Voi vaeltaa suoraan pelaajan sijaintiin (EMF 2).\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Poltergeist", ev: ["Spirit Box", "Ultraviolet", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "POLTERGEIST INFO:\n\n- POLTER-BOMB: Voi heittää useita esineitä kerralla. Jokainen esine vie 2% sanitya.\n\n- HEITTÄMINEN: Huntissa heittää esineen 0,5s välein 100% varmuudella.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Raiju", ev: ["EMF 5", "Ghost Orb", "D.O.T.S"], h: "65%", g: "ALL", los: true, audio: [{label: "Sähkö (2.5 m/s / 175 BPM)", speed: 2.5, bpm: 175}, {label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "RAIJU INFO:\n\n- HUNT-RAJA: 65% elektroniikan lähellä, muuten 50%.\n\n- NOPEUS: 2.5 m/s (175 BPM) sähkölaitteiden kantamalla. Muuten 1.7 m/s (120 BPM).\n\n- HÄIRIÖT: Sekoittaa laitteet jo 15m päästä." },
        { n: "Revenant", ev: ["Ghost Orb", "Ghost Writing", "Freezing"], h: "50%", g: "ALL", los: false, audio: [{label: "Näkee (3.0 m/s / 210 BPM)", speed: 3.0, bpm: 210}, {label: "Hidas (1.1 m/s / 78 BPM)", speed: 1.1, bpm: 78}], det: "REVENANT INFO:\n\n- NOPEUS: 3.0 m/s (210 BPM) jos tietää pelaajan sijainnin. 1.1 m/s (78 BPM) jos etsii.\n\n- HIDASTUMINEN: Hidastuu nopeasti 1.1 m/s, kun saavuttaa havaintopaikan." },
        { n: "Shade", ev: ["EMF 5", "Ghost Writing", "Freezing"], h: "35%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "SHADE INFO:\n\n- HUNT SANITY: 35%.\n\n- UJO: Ei voi aloittaa huntia, jos samassa huoneessa on pelaaja.\n\n- EVENTIT: Usein varjomaisia tai Mist Ball -tyyppisiä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Spirit", ev: ["EMF 5", "Spirit Box", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "SPIRIT INFO:\n\n- SUITSUKE: Estää huntin 180 sekunniksi (3 min).\n\n- PERUSHAAMU: Ei muita erikoiskykyjä, vaikea tunnistaa ilman testiä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Thaye", ev: ["Ghost Orb", "Ghost Writing", "D.O.T.S"], h: "75%", g: "ALL", los: false, audio: [{label: "Nuori (2.75 m/s / 195 BPM)", speed: 2.75, bpm: 195}, {label: "Vanhus (1.0 m/s / 70 BPM)", speed: 1.0, bpm: 70}], det: "THAYE INFO:\n\n- IKÄÄNTYMINEN: Ikääntyy 1-2 min välein pelaajan seurassa (max 10 kertaa).\n\n- HUNT-RAJA: Nuorena 75%, Vanhana 15%.\n\n- NOPEUS: Nuorena 2.75 m/s (195 BPM), Vanhana 1.0 m/s (70 BPM).\n\n- LOS: Ei kiihdy koskaan näköyhteydestä." },
        { n: "The Mimic", ev: ["Spirit Box", "Ultraviolet", "Freezing"], h: "Var.", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "THE MIMIC INFO:\n\n- MATKIMINEN: Kopioi minkä tahansa haamun ominaisuudet.\n\n- GHOST ORBS: Näyttää AINA haamupalloja todisteena (4. todiste).\n\n- NOPEUS: Matkii kopioitua haamua (Vakio 120 BPM)." },
        { n: "The Twins", ev: ["EMF 5", "Spirit Box", "Freezing"], h: "50%", g: "ALL", los: true, audio: [{label: "Hidas (1.5 m/s / 108 BPM)", speed: 1.5, bpm: 108}, {label: "Nopea (1.9 m/s / 135 BPM)", speed: 1.9, bpm: 135}], det: "THE TWINS INFO:\n\n- KAKSI HAAMUA: Päähaamu (hidas 1.53 m/s / 108 BPM) ja Kopio (nopea 1.87 m/s / 135 BPM).\n\n- TWIN-INTERACTION: Kaksi interaktiota eri paikoissa lähes samanaikaisesti." },
        { n: "Wraith", ev: ["EMF 5", "Spirit Box", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["not_salt_step"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "WRAITH INFO:\n\n- SUOLAKOE: Ei astu suolaan KOSKAAN.\n\n- TELEPORTTI: Voi teleportata suoraan pelaajan viereen (EMF 2/5).\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Yokai", ev: ["Spirit Box", "Ghost Orb", "D.O.T.S"], h: "50/80%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "YOKAI INFO:\n\n- HUNT-RAJA: 80% jos puhut lähellä, muuten 50%.\n\n- KUULO: Huntin aikana kuulee äänet vain n. 2,5m päästä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." },
        { n: "Yurei", ev: ["Ghost Orb", "Freezing", "D.O.T.S"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "YUREI INFO:\n\n- MIELENTERVEYS: Voi laskea 15% sulkemalla oven haamuhuoneessa.\n\n- OVET: Ainoa haamu, joka sulkee pääoven ilman huntia/eventtiä.\n\n- NOPEUS: 1.7 m/s (120 BPM)." }
    ];

    let activeEv = []; let activeElim = []; let currentGender = null; let losActive = false; let audioCtx = null; let stepTimer = null; let currentBpm = 0;

    function renderTable() {
        const tbody = document.getElementById('ghost-table');
        tbody.innerHTML = '';
        ghosts.sort((a,b) => a.n.localeCompare(b.n)).forEach(g => {
            let evMatch = activeEv.every(e => g.ev.includes(e));
            let genderMatch = !currentGender || (currentGender === 'M' && g.g !== 'F') || (currentGender === 'F' && g.g !== 'M');
            let elimMatch = activeElim.every(e => !g.tags?.includes('not_' + e));
            let losMatch = !losActive || (losActive && g.los);
            
            // Tarkistetaan BPM match
            let bpmHighlight = false;
            if (currentBpm > 0) {
                bpmHighlight = g.audio.some(a => Math.abs(a.bpm - currentBpm) < (a.bpm * 0.1));
            }

            const tr = document.createElement('tr');
            let classes = [];
            if (!evMatch || !genderMatch || !elimMatch || !losMatch) classes.push('impossible');
            if (bpmHighlight && evMatch && genderMatch && elimMatch && losMatch) classes.push('bpm-match');
            tr.className = classes.join(' ');

            tr.innerHTML = `<td style="width:50px"><button class="info-btn" onclick="openModal('${g.n}')">i</button></td><td><b style="font-size:1.1rem">${g.n}</b><br><small style="color:#888">${g.ev.join(', ')}</small></td><td style="text-align:right"><span style="color:#ff4444; font-weight:bold">${g.h}</span></td>`;
            tbody.appendChild(tr);
        });
    }

    function toggleLos(el) { losActive = !losActive; el.classList.toggle('los-active'); renderTable(); }
    function toggleEv(ev, el) { if(activeEv.includes(ev)) activeEv = activeEv.filter(x => x !== ev); else if(activeEv.length < 3) activeEv.push(ev); el.classList.toggle('active'); renderTable(); }
    function toggleElim(type, el) { if (activeElim.includes(type)) activeElim = activeElim.filter(x => x !== type); else activeElim.push(type); el.classList.toggle('elim-active'); renderTable(); }
    function setGender(g) { currentGender = (currentGender === g) ? null : g; document.getElementById('male-btn').classList.toggle('active', currentGender === 'M'); document.getElementById('female-btn').classList.toggle('active', currentGender === 'F'); renderTable(); }
    
    function openModal(name) {
        const g = ghosts.find(x => x.n === name);
        let audioBtns = g.audio.map(a => `<button class="audio-test-btn" onclick="playStep(${a.speed})">🔊 KUUNTELE: ${a.label}</button>`).join('');
        document.getElementById('modal-content').innerHTML = `
            <div style="font-size:1.8rem; color:#ffaa00; font-weight:bold; border-bottom:2px solid #ff4444">${g.n.toUpperCase()}</div>
            <span class="m-header">Info</span>
            <div class="m-body">${g.det}</div>
            <div class="audio-lab">
                <div style="color:#9b59b6; font-weight:bold; margin-bottom:5px; font-size:0.8rem">AUDIO SIMULAATTORI</div>
                ${audioBtns}
                <button onclick="stopAudio()" style="background:#555; color:white; width:100%; border:none; padding:5px; margin-top:5px; border-radius:4px;">STOP AUDIO</button>
            </div>`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function playStep(speed) {
        stopAudio();
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function tick() {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(130, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            let interval = (0.85 / speed) * 1000;
            stepTimer = setTimeout(tick, interval);
        }
        tick();
    }

    function stopAudio() { clearTimeout(stepTimer); }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; stopAudio(); }
    function resetAll() { activeEv = []; activeElim = []; currentGender = null; losActive = false; currentBpm = 0; document.getElementById('bpm-val').innerText = '0'; document.querySelectorAll('button').forEach(b => b.classList.remove('active', 'elim-active', 'los-active')); renderTable(); }
    
    function resetBpm() { currentBpm = 0; tapTimes = []; document.getElementById('bpm-val').innerText = '0'; renderTable(); }

    let tapTimes = [];
    function tapBpm() { 
        let now = Date.now(); 
        tapTimes.push(now); 
        if (tapTimes.length > 8) tapTimes.shift(); 
        if (tapTimes.length > 1) { 
            let avg = (tapTimes[tapTimes.length-1] - tapTimes[0]) / (tapTimes.length - 1); 
            currentBpm = 60000 / avg;
            document.getElementById('bpm-val').innerText = currentBpm.toFixed(1); 
            renderTable();
        } 
    }
    
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); tapBpm(); } });
    renderTable();
</script>
</body>
</html>
