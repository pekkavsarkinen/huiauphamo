        { n: "Dayan", ev: ["EMF 5", "Ghost Orb", "Spirit Box"], h: "Var.", g: "F", los: true, audio: [{label: "Kävelee lähellä (2.25 m/s)", speed: 2.25, bpm: 158}, {label: "Seisoo lähellä (1.2 m/s)", speed: 1.2, bpm: 84}, {label: "Kaukana (1.7 m/s)", speed: 1.7, bpm: 120}], det: "DAYAN INFO:\n\n- Voi olla vain nainen; kummitusmalli ja nimi heijastavat tätä\n- Metsästysnopeus ja -raja määräytyvät pelaajan liikkeen perusteella kummituksen lähellä\n- METSÄSTYSRAJAT: 65 % (kävelee), 45 % (seisoo), 50 % (kaukana)\n- METSÄSTYSNOPEUS: 2.25 m/s (pelaaja liikkuu 10m sisällä), 1.2 m/s (pelaaja paikallaan 10m sisällä), 1.7 m/s (yli 10m päässä)\n- LOS-kiihtyvyys pätee vain yli 10m päässä." },

        { n: "Deogen", ev: ["Spirit Box", "Ghost Writing", "D.O.T.S"], h: "40%", g: "ALL", los: false, audio: [{label: "Kaukana (3.0 m/s / 210 BPM)", speed: 3.0, bpm: 210}, {label: "Lähellä (0.4 m/s / 28 BPM)", speed: 0.4, bpm: 28}], det: "DEOGEN INFO:\n\n- Tietää aina pelaajien sijainnin metsästyksen aikana (ei voi piiloutua)\n- Spirit Box: Uniikki 'raskas hengitys' (33 % mahd.) 1m sisällä\n- NOPEUS: 3.0 m/s (kaukana) -> 0.4 m/s (alle 2.5m päässä)\n- Ei saa LOS-kiihtyvyyttä." },
        { n: "Gallu", ev: ["EMF 5", "Ultraviolet", "Spirit Box"], h: "40/50/60%", g: "ALL", los: true, audio: [{label: "Normal (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}, {label: "Enraged (1.96 m/s / 138 BPM)", speed: 1.96, bpm: 138}, {label: "Weakened (1.36 m/s / 96 BPM)", speed: 1.36, bpm: 96}], det: "GALLU INFO:\n\nKiertää tiloja (Normaali > Raivostunut > Heikentynyt):\n- NORMAALI: 1.7 m/s, raja 50 %. Suola/suitsuke/risti -> Raivostunut.\n- RAIVOSTUNUT: 1.96 m/s, raja 60 %, EI jälkiä suolaan, risti -2m kantama.\n- HEIKENTYNYT: 1.36 m/s, raja 40 %, risti +1m kantama, suitsuke-sokeus 6s." },
        { n: "Goryo", ev: ["EMF 5", "Ultraviolet", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["dots_naked"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "GORYO INFO:\n\n- D.O.T.S näkyy VAIN videokameran läpi\n- Ei näytä D.O.T.S:ia, jos samassa huoneessa on pelaajia\n- Ei vaeltele kauas tai vaihda suosikkihuonettaan.\n- NOPEUS: 1.7 m/s." },
        { n: "Hantu", ev: ["Ultraviolet", "Ghost Orb", "Freezing"], h: "50%", g: "ALL", los: false, tags: ["not_breaker_on"], audio: [{label: "Kylmä (2.7 m/s / 190 BPM)", speed: 2.7, bpm: 190}, {label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}, {label: "Lämmin (1.4 m/s / 100 BPM)", speed: 1.4, bpm: 100}], det: "HANTU INFO:\n\n- Nopeus riippuu huoneen lämpötilasta:\n  - 0-3°C: 2.7 m/s\n  - 15°C: 1.75 m/s\n  - Yli 15°C: 1.4 m/s\n- Ei saa lainkaan näköyhteys-kiihtyvyyttä (LOS).\n- Puhaltaa näkyvää huurua suustaan metsästyksen aikana, jos virta (breaker) on pois päältä.\n- 2x todennäköisyys sammuttaa virta (breaker).\n- Ei voi kytkeä virtaa päälle itse." },
        { n: "Jinn", ev: ["EMF 5", "Ultraviolet", "Freezing"], h: "50%", g: "ALL", los: true, tags: ["not_breaker_off"], audio: [{label: "Syöksy (2.5 m/s / 175 BPM)", speed: 2.5, bpm: 175}, {label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "JINN INFO:\n\n- Jos virta (breaker) on päällä, Jinn syöksyy kovaa (2.5 m/s) nähdessään pelaajan yli 3 metrin päässä. Lähellä se hidastaa vakionopeuteen.\n- Kyky viedä 25 % mielenterveyttä kaikilta lähellä olevilta pelaajilta (jättää samalla EMF 2/5 jäljen sähkökaapille).\n- Ei voi sammuttaa virtaa (breaker) itse.\n- Jos virta on pois päältä, Jinn on tavallinen 1.7 m/s haamu ilman erikoiskykyjä." },
        { n: "Mare", ev: ["Spirit Box", "Ghost Orb", "Ghost Writing"], h: "40/60%", g: "ALL", los: true, tags: ["not_light_on"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "MARE INFO:\n\n- Metsästysraja on 60 %, jos valot ovat pois päältä kummituksen huoneessa.\n- Metsästysraja on 40 %, jos valot ovat päällä kummituksen huoneessa.\n- Voi sammuttaa valokatkaisijan välittömästi, kun pelaaja sytyttää sen.\n- Kyky sammuttaa valo mistä tahansa huoneesta, jolloin EMF-lukemaa ei tule katkaisijalle.\n- Ei voi sytyttää valoja.\n- Suosii vaeltamista pimeisiin huoneisiin." },
        { n: "Moroi", ev: ["Spirit Box", "Ghost Writing", "Freezing"], h: "50%", g: "ALL", los: true, audio: [{label: "Min (1.5 m/s / 106 BPM)", speed: 1.5, bpm: 106}, {label: "Max (2.25 m/s / 160 BPM)", speed: 2.25, bpm: 160}], det: "MOROI INFO:\n\n- Nopeus riippuu pelaajien keskimääräisestä mielenterveydestä: mitä alempi mielenterveys, sitä nopeampi Moroi on.\n- Nopeus vaihtelee välillä 1.5 m/s (50% sanity) and 2.25 m/s (0% sanity).\n- Saa normaalin näköyhteys-kiihtyvyyden (LOS), jolloin huippunopeus voi nousta jopa 3.71 m/s:iin.\n- Kiroaa pelaajan, joka saa vastauksen Spirit Boxilla tai kuulee haamun äänen parabolisella mikrofonilla. Kirous tuplaa passiivisen mielenterveyden kulumisen.\n- Kirous poistuu vain ottamalla mielenterveyslääkkeitä (Sanity Medication).\n- Suitsuke (Smudge Stick) sokeuttaa Moroin metsästyksen aikana 12 sekunniksi (normaali on 6s)." },
        { n: "Myling", ev: ["EMF 5", "Ultraviolet", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "MYLING INFO:\n\n- Myling on hiljaisempi metsästäjä: sen askeleet ja äänet kuuluvat vain hyvin läheltä (alle 12 metriä).\n- Jos kuulet askeleet, Myling on jo samassa kerroksessa ja suhteellisen lähellä.\n- Pitää enemmän ääntä parabolisessa mikrofonissa (useammin kuuluvia paranormalisia ääniä).\n- Hyvä testi: Jos taskulamppu alkaa välkkyä, mutta et kuule vielä askeleita, se on todennäköisesti Myling.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Obambo", ev: ["Ghost Writing", "Ultraviolet", "D.O.T.S"], h: "65% / 10%", g: "ALL", los: true, audio: [{label: "Aggressive (1.96 m/s / 138 BPM)", speed: 1.96, bpm: 138}, {label: "Calm (1.45 m/s / 102 BPM)", speed: 1.45, bpm: 102}], det: "OBAMBO INFO:\n\n- Vaihtelee kahden tilan välillä noin 2 minuutin välein: 'Aggressiivinen' ja 'Rauhallinen'.\n- AGGRESSIIVINEN TILA:\n  - Metsästysraja: 65 %.\n  - Nopeus: 1.96 m/s.\n  - Metsästyksen kesto lyhenee 20 %.\n- RAUHALLINEN TILA:\n  - Metsästysraja: 10 %.\n  - Nopeus: 1.45 m/s.\n- Voi vaihtaa tilaa kesken metsästyksen, jolloin nopeus muuttuu välittömästi.\n- Ajastin alkaa n. 1 min kohdalla 'rauhallista' tilaa kun etuovi avataan." },
        { n: "Obake", ev: ["EMF 5", "Ultraviolet", "Ghost Orb"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "OBAKE INFO:\n\n- Ultraviolet: Voi jättää uniikkeja 6-sormisia jalanjälkiä tai kädenjälkiä (6.6 % mahdollisuus).\n- Kyky puolittaa olemassa olevien sormenjälkien kestoaika (normaalisti ne kestävät 2 min).\n- Metsästyksen aikana Obakella on 6.6 % mahdollisuus muuttaa ulkonäköään (shapestift) hetkeksi jokaisen välähdyksen aikana. Se palaa takaisin alkuperäiseen muotoonsa seuraavassa välähdyksessä.\n- 25 % mahdollisuus olla jättämättä sormenjälkiä lainkaan kosketuksesta.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Oni", ev: ["EMF 5", "Freezing", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["not_mist_ball"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "ONI INFO:\n\n- Huomattavasti aktiivisempi, kun pelaajia on samassa huoneessa.\n- Kyky tyhjentää mielenterveyttä tuplasti nopeammin (20 %) kummitustapahtumien aikana, jos pelaaja törmää siihen.\n- Ei voi tehdä 'Mist Ball' -tapahtumaa (ilmestyy aina fyysisessä muodossa).\n- Näkyy huomattavasti pidempään välähdysten aikana metsästyksen aikana.\n- Heittää esineitä suurella voimalla ja useammin kuin muut kummitukset.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Onryo", ev: ["Spirit Box", "Ghost Orb", "Freezing"], h: "60%*", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "ONRYO INFO:\n\n- Tuli (kynttilät/nuotiot) toimivat kuin risti Onryolle: se ei voi metsästää 4 metrin säteellä palavasta tulesta.\n- Jos Onryo puhaltaa tulen sammuksiin, on olemassa suuri mahdollisuus, että se aloittaa metsästyksen välittömästi (riippumatta mielenterveydestä).\n- Jokainen kolmas sammutettu tuli aloittaa metsästyksen varmasti, jos lähellä ei ole muita palavia tulia tai ristiä.\n- Pelkää tulta: jos huoneessa on tuli, se suosii kynttilän sammuttamista metsästyksen sijaan.\n- Metsästysraja: 60 % (nousee jos tulia sammutetaan).\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Phantom", ev: ["Spirit Box", "Ultraviolet", "D.O.T.S"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "PHANTOM INFO:\n\n- Jos otat Phantomista kuvan, se katoaa välittömästi, mutta kuva on täysin selkeä ilman haamun kuvaa (kuva rekisteröityy silti 'Ghost' kuvaksi).\n- Pelaajan mielenterveys laskee 0.5 % sekunnissa (tuplat), jos haamu on näköpiirissä kummitustapahtuman tai metsästyksen aikana.\n- Metsästyksen aikana Phantom on näkymätön pidempään välähdysten välillä (vilkkuu hitaammin, n. 1-2 sekunnin välein).\n- Kyky vaeltaa satunnaisen pelaajan luo jättää EMF 2 -jäljen.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Poltergeist", ev: ["Spirit Box", "Ultraviolet", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "POLTERGEIST INFO:\n\n- Tunnettu tavaroiden heittelystä: voi heittää useita esineitä kerralla (Poltergeist-räjähdys), jolloin jokainen heitetty esine laskee lähellä olevien pelaajien mielenterveyttä 2 %.\n- Heittää esineitä useammin ja voimakkaammin metsästyksen aikana (joka 0.5 sekunti).\n- Jos huoneessa ei ole heitettäviä esineitä, Poltergeist on huomattavasti heikompi kummitus.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Raiju", ev: ["EMF 5", "Ghost Orb", "D.O.T.S"], h: "65%", g: "ALL", los: true, audio: [{label: "Sähkö (2.5 m/s / 175 BPM)", speed: 2.5, bpm: 175}, {label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "RAIJU INFO:\n\n- Saa voimaa sähkölaitteista: jos kummituksen lähellä on päällä olevia sähkölaitteita, sen metsästysraja nousee 65 prosenttiin.\n- Sähkölaitteiden lähellä Raiju liikkuu huomattavasti nopeammin (2.5 m/s).\n- Sähkölaitteet vaikuttavat Raijuun tietyllä etäisyydellä (pienet kartat: 6m, keskisuuret: 10m, suuret: 15m).\n- Häiritsee sähkölaitteita (esim. taskulamppu) 15 metrin päästä (normaali on 10m).\n- NOPEUS: 2.5 m/s (laitteiden lähellä) / 1.7 m/s (muuten)." },
        { n: "Revenant", ev: ["Ghost Orb", "Ghost Writing", "Freezing"], h: "50%", g: "ALL", los: false, audio: [{label: "Näkee (3.0 m/s / 210 BPM)", speed: 3.0, bpm: 210}, {label: "Hidas (1.1 m/s / 78 BPM)", speed: 1.1, bpm: 78}], det: "REVENANT INFO:\n\n- Pelottavin nopeus: jos Revenant havaitsee pelaajan (näköhavainto tai ääni/laite), se kiihtyy välittömästi nopeuteen 3.0 m/s.\n- Jos Revenant ei tiedä missä pelaaja on, se liikkuu todella hitaasti (1.1 m/s).\n- Saavuttaa huippunopeutensa lähes välittömästi nähdessään kohteen.\n- Kun se saavuttaa paikan, jossa pelaaja viimeksi nähtiin, se alkaa hidastua takaisin 1.1 m/s nopeuteen 2.7 sekunnin kuluessa.\n- NOPEUS: 3.0 m/s (jahdissa) / 1.1 m/s (etsiessä)." },
        { n: "Shade", ev: ["EMF 5", "Ghost Writing", "Freezing"], h: "35%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "SHADE INFO:\n\n- Ujo kummitus: ei voi aloittaa metsästystä, jos pelaaja on samassa huoneessa.\n- Kummitustapahtumien todennäköisyys on huomattavasti pienempi (nousee mitä alempi mielenterveys on).\n- Mielenterveyden pitää olla alle 35 % ennen kuin Shade voi metsästää.\n- Varjomuoto: suosii näyttäytymistä varjona tai läpinäkyvänä kummitustapahtumien aikana.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Spirit", ev: ["EMF 5", "Spirit Box", "Ghost Writing"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "SPIRIT INFO:\n\n- Peruskummitus ilman suuria vahvuuksia, mutta heikkous on suitsuke (Smudge Stick).\n- Jos Spiritin päälle käytetään suitsuketta, se ei voi metsästää 180 sekuntiin (3 minuuttia). Muilla kummituksilla tämä aika on 90 sekuntia (Demonilla 60s).\n- Ei erikoistaitoja nopeuden tai metsästysrajan suhteen.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Thaye", ev: ["Ghost Orb", "Ghost Writing", "D.O.T.S"], h: "75%", g: "ALL", los: false, audio: [{label: "Nuori (2.75 m/s / 195 BPM)", speed: 2.75, bpm: 195}, {label: "Vanhus (1.0 m/s / 70 BPM)", speed: 1.0, bpm: 70}], det: "THAYE INFO:\n\n- Thaye on aktiivisimmillaan heti pelin alussa. Mitä kauemmin pelaajat viettävät aikaa sen lähellä, sitä enemmän se 'ikääntyy'.\n- IKÄÄNTYMINEN: Joka 1-2 minuutin välein se yrittää ikääntyä, jos pelaaja on samassa huoneessa.\n- METSÄSTYSRAJA: Alkaa 75 prosentista ja laskee jokaisen ikääntymisen myötä jopa 15 prosenttiin.\n- NOPEUS: Alkaa 2.75 m/s ja hidastuu jokaisella vaiheella (yhteensä 10 vaihetta), kunnes se on vain 1.0 m/s.\n- AKTIVITEETTI: Alussa erittäin aggressiivinen ja tekee paljon interaktioita, lopussa muuttuu passiiviseksi.\n- OUIJA-LAUTA: Vastaa ikäänsä (nuorena esim. 2v, vanhana jopa 90v).\n- Ei saa LOS-kiihtyvyyttä." },
        { n: "The Mimic", ev: ["Spirit Box", "Ultraviolet", "Freezing"], h: "Var.", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "THE MIMIC INFO:\n\n- VALETODISTE: Mimic näyttää AINA Ghost Orbin neljäntenä todisteena (vaikka orbi ei kuulu sen virallisiin todisteisiin). Jos näet orbeja painajais-vaikeustasolla, se on lähes varmasti Mimic.\n- Jäljittelee muita kummituksia: se voi kopioida minkä tahansa muun haamun ominaisuudet (esim. Revenantin nopeuden, Demonin aggression tai Thayen ikääntymisen).\n- Vaihtaa matkittavaa haamua 30 sekunnin - 2 minuutin välein.\n- Jos se matkii esim. Moriota, se voi kirota pelaajia Boxin kautta.\n- Älä luota pelkkiin orbeihin, jos muut todisteet viittaavat Mimiciin!" },
        { n: "The Twins", ev: ["EMF 5", "Spirit Box", "Freezing"], h: "50%", g: "ALL", los: true, audio: [{label: "Pääkummitus (1.53 m/s / 108 BPM)", speed: 1.53, bpm: 108}, {label: "Sivukummitus (1.87 m/s / 132 BPM)", speed: 1.87, bpm: 132}], det: "THE TWINS INFO:\n\n- Kaksi kummitusta yhdessä: Pääkummitus (Main) pysyy huoneessa, kun taas sivukummitus (Decoy) tekee interaktioita kauempana.\n- KAKSOISINTERAKTIO: Voivat tehdä kaksi asiaa lähes samanaikaisesti eri paikoissa (näkyy usein EMF-mittarissa porrastetuna).\n- METSÄSTYS: Kumpi tahansa voi aloittaa metsästyksen, mutta ei molemmat samaan aikaan.\n- NOPEUSERO:\n  - Pääkummitus (Main) on 10 % hitaampi (1.53 m/s).\n  - Sivukummitus (Decoy) on 10 % nopeampi (1.87 m/s).\n- Jos haamu aloittaa metsästyksen kaukana suosikkihuoneesta, se on todennäköisesti nopeampi sivukummitus." },
        { n: "Wraith", ev: ["EMF 5", "Spirit Box", "D.O.T.S"], h: "50%", g: "ALL", los: true, tags: ["not_salt_step"], audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "WRAITH INFO:\n\n- Wraith ei koskaan kosketa maata: se ei jätä jalanjälkiä suolaan (vaikka voi silti astua suolaan, jalanjälkiä ei tule UV-valossa).\n- Kyky vaeltaa välittömästi satunnaisen pelaajan luo (jättää EMF 2 -jäljen).\n- Muuttuu erittäin aktiiviseksi, jos se havaitsee suolaa.\n- Voi nähdä ovien läpi.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Yokai", ev: ["Spirit Box", "Ghost Orb", "D.O.T.S"], h: "50/80%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "YOKAI INFO:\n\n- Reagoi voimakkaasti ääneen: jos pelaajat puhuvat lähellä Yokaita, se voi aloittaa metsästyksen jopa 80 % mielenterveydellä.\n- Metsästyksen aikana Yokai on kuuro: se kuulee pelaajien puheen tai sähkölaitteet vain 2.5 metrin etäisyydeltä (normaali on 10m).\n- Lisääntynyt aktiivisuus, kun sen lähellä puhutaan.\n- NOPEUS: Vakio 1.7 m/s." },
        { n: "Yurei", ev: ["Ghost Orb", "Freezing", "D.O.T.S"], h: "50%", g: "ALL", los: true, audio: [{label: "Vakio (1.7 m/s / 120 BPM)", speed: 1.7, bpm: 120}], det: "YUREI INFO:\n\n- Kyky tyhjentää mielenterveyttä nopeasti: jos se tekee erikoiskykynsä, lähellä olevat pelaajat menettävät 15 % mielenterveyttä (ilmoittaa tästä paukauttamalla oven kiinni).\n- Suitsuke (Smudge Stick) huoneessa estää Yureita liikkumasta pois huoneesta tai vaeltamasta 90 sekunnin ajan.\n- Suosii ovien ja kaappien availua/sulkemista.\n- NOPEUS: Vakio 1.7 m/s." }
    ];

    let activeEv = []; let activeElim = []; let currentGender = null; let losActive = false; let audioCtx = null; let stepTimer = null; let currentBpm = 0; let gameSpeed = 1.0;

    function renderTable() {
        const tbody = document.getElementById('ghost-table');
        tbody.innerHTML = '';
        
        const processedGhosts = ghosts.map(g => {
            let evMatch = activeEv.every(e => g.ev.includes(e));
            let genderMatch = !currentGender || (currentGender === 'M' && g.g !== 'F') || (currentGender === 'F' && g.g !== 'M');
            
            let elimMatch = true;
            if (activeElim.includes('dots_naked') && g.tags?.includes('dots_naked')) elimMatch = false;
            if (activeElim.includes('mist_ball') && g.tags?.includes('not_mist_ball')) elimMatch = false;
            if (activeElim.includes('salt_step') && g.tags?.includes('not_salt_step')) elimMatch = false;
            if (activeElim.includes('breaker_off') && g.tags?.includes('not_breaker_off')) elimMatch = false;
            if (activeElim.includes('light_on') && g.tags?.includes('not_light_on')) elimMatch = false;
            
            let losMatch = !losActive || (losActive && g.los);
            let isPossible = evMatch && genderMatch && elimMatch && losMatch;
            
            let bpmHighlight = false;
            if (currentBpm > 0 && isPossible) {
                // Skaalataan tavoite-BPM pelin nopeuden mukaan (esim. 150% nopeus nostaa BPM tavoitetta 1.5x)
                bpmHighlight = g.audio.some(a => {
                    let targetBpm = a.bpm * gameSpeed;
                    return Math.abs(targetBpm - currentBpm) < (targetBpm * 0.08);
                }); 
            }

            return { ...g, isPossible, bpmHighlight };
        });

        processedGhosts.sort((a, b) => {
            if (a.isPossible !== b.isPossible) return a.isPossible ? -1 : 1;
            return a.n.localeCompare(b.n);
        });

        processedGhosts.forEach(g => {
            const tr = document.createElement('tr');
            let classes = [];
            if (!g.isPossible) classes.push('impossible');
            if (g.bpmHighlight) classes.push('bpm-match');
            tr.className = classes.join(' ');

            tr.innerHTML = `<td style="width:50px"><button class="info-btn" onclick="openModal('${g.n}')">i</button></td><td><b style="font-size:1.1rem">${g.n}</b><br><small style="color:#888">${g.ev.join(', ')}</small></td><td style="text-align:right"><span style="color:#ff4444; font-weight:bold">${g.h}</span></td>`;
            tbody.appendChild(tr);
        });
    }

    function setSpeed(val, el) {
        gameSpeed = val;
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        renderTable();
    }

    function toggleLos(el) { losActive = !losActive; el.classList.toggle('los-active'); renderTable(); }
    function toggleEv(ev, el) { if(activeEv.includes(ev)) activeEv = activeEv.filter(x => x !== ev); else if(activeEv.length < 3) activeEv.push(ev); el.classList.toggle('active'); renderTable(); }
    function toggleElim(type, el) { if (activeElim.includes(type)) activeElim = activeElim.filter(x => x !== type); else activeElim.push(type); el.classList.toggle('elim-active'); renderTable(); }
    function setGender(g) { currentGender = (currentGender === g) ? null : g; document.getElementById('male-btn').classList.toggle('active', currentGender === 'M'); document.getElementById('female-btn').classList.toggle('active', currentGender === 'F'); renderTable(); }
    
    function openModal(name) {
        const g = ghosts.find(x => x.n === name);
        let audioBtns = g.audio.map(a => `<button class="audio-test-btn" onclick="playStep(${a.speed})">🔊 KUUNTELE: ${a.label}</button>`).join('');
        document.getElementById('modal-content').innerHTML = `
            <div style="font-size:1.8rem; color:#ffaa00; font-weight:bold; border-bottom:2px solid #ff4444">${g.n.toUpperCase()}</div>
            <span class="m-header">Tiedot</span>
            <div class="m-body">${g.det}</div>
            <div class="audio-lab">
                <div style="color:#9b59b6; font-weight:bold; margin-bottom:5px; font-size:0.8rem">AUDIO SIMULAATTORI (Käyttää ${Math.round(gameSpeed*100)}% kerrointa)</div>
                ${audioBtns}
                <button onclick="stopAudio()" style="background:#555; color:white; width:100%; border:none; padding:5px; margin-top:5px; border-radius:4px;">STOP AUDIO</button>
            </div>`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function playStep(speed) {
        stopAudio();
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Skaalataan askellustiheys pelin kertoimen mukaan
        let adjustedSpeed = speed * gameSpeed;

        function tick() {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(130, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            
            // Mitä kovempi vauhti (adjustedSpeed), sitä pienempi väli (interval)
            let interval = (0.85 / adjustedSpeed) * 1000;
            stepTimer = setTimeout(tick, interval);
        }
        tick();
    }

    function stopAudio() { clearTimeout(stepTimer); }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; stopAudio(); }
    function resetAll() { activeEv = []; activeElim = []; currentGender = null; losActive = false; currentBpm = 0; document.getElementById('bpm-val').innerText = '0'; document.querySelectorAll('button').forEach(b => b.classList.remove('active', 'elim-active', 'los-active')); document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active')); document.querySelector('.speed-btn[onclick*="1.0"]').classList.add('active'); gameSpeed = 1.0; renderTable(); }
    function resetBpm() { currentBpm = 0; tapTimes = []; document.getElementById('bpm-val').innerText = '0'; renderTable(); }

    let tapTimes = [];
    function tapBpm() { 
        let now = Date.now(); 
        tapTimes.push(now); 
        if (tapTimes.length > 8) tapTimes.shift(); 
        if (tapTimes.length > 1) { 
            let avg = (tapTimes[tapTimes.length-1] - tapTimes[0]) / (tapTimes.length - 1); 
            currentBpm = 60000 / avg;
            document.getElementById('bpm-val').innerText = currentBpm.toFixed(1); 
            renderTable();
        } 
    }
    
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); tapBpm(); } });
    renderTable();
</script>
</body>
</html>
