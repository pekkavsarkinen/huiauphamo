    let activeEv = []; let activeElim = []; let currentGender = null; let losActive = false; let audioCtx = null; let stepTimer = null;

    function renderTable() {
        const tbody = document.getElementById('ghost-table');
        tbody.innerHTML = '';
        ghosts.sort((a,b) => a.n.localeCompare(b.n)).forEach(g => {
            let evMatch = activeEv.every(e => g.ev.includes(e));
            let genderMatch = !currentGender || (currentGender === 'M' && g.g !== 'F') || (currentGender === 'F' && g.g !== 'M');
            let elimMatch = activeElim.every(e => !g.tags?.includes('not_' + e));
            let losMatch = !losActive || (losActive && g.los);
            const tr = document.createElement('tr');
            if (!evMatch || !genderMatch || !elimMatch || !losMatch) tr.className = 'impossible';
            tr.innerHTML = `<td style="width:50px"><button class="info-btn" onclick="openModal('${g.n}')">i</button></td><td><b style="font-size:1.1rem">${g.n}</b><br><small style="color:#888">${g.ev.join(', ')}</small></td><td style="text-align:right"><span style="color:#ff4444; font-weight:bold">${g.h}</span></td>`;
            tbody.appendChild(tr);
        });
    }

    function toggleLos(el) { losActive = !losActive; el.classList.toggle('los-active'); renderTable(); }
    function toggleEv(ev, el) { if(activeEv.includes(ev)) activeEv = activeEv.filter(x => x !== ev); else if(activeEv.length < 3) activeEv.push(ev); el.classList.toggle('active'); renderTable(); }
    function toggleElim(type, el) { if (activeElim.includes(type)) activeElim = activeElim.filter(x => x !== type); else activeElim.push(type); el.classList.toggle('elim-active'); renderTable(); }
    function setGender(g) { currentGender = (currentGender === g) ? null : g; document.getElementById('male-btn').classList.toggle('active', currentGender === 'M'); document.getElementById('female-btn').classList.toggle('active', currentGender === 'F'); renderTable(); }
    
    function openModal(name) {
        const g = ghosts.find(x => x.n === name);
        let audioBtns = g.audio.map(a => `<button class="audio-test-btn" onclick="playStep(${a.speed})">🔊 KUUNTELE: ${a.label}</button>`).join('');
        document.getElementById('modal-content').innerHTML = `
            <div style="font-size:1.8rem; color:#ffaa00; font-weight:bold; border-bottom:2px solid #ff4444">${g.n.toUpperCase()}</div>
            <span class="m-header">Info</span>
            <div class="m-body">${g.det}</div>
            <div class="audio-lab">
                <div style="color:#9b59b6; font-weight:bold; margin-bottom:5px; font-size:0.8rem">AUDIO SIMULAATTORI</div>
                ${audioBtns}
                <button onclick="stopAudio()" style="background:#555; color:white; width:100%; border:none; padding:5px; margin-top:5px; border-radius:4px;">STOP AUDIO</button>
            </div>`;
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('modal').style.display = 'block';
    }

    function playStep(speed) {
        stopAudio();
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function tick() {
            let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(130, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            let interval = (0.85 / speed) * 1000;
            stepTimer = setTimeout(tick, interval);
        }
        tick();
    }

    function stopAudio() { clearTimeout(stepTimer); }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; document.getElementById('modal').style.display = 'none'; stopAudio(); }
    function resetAll() { activeEv = []; activeElim = []; currentGender = null; losActive = false; document.querySelectorAll('button').forEach(b => b.classList.remove('active', 'elim-active', 'los-active')); renderTable(); }
    function tapBpm() { let now = Date.now(); tapTimes.push(now); if (tapTimes.length > 5) tapTimes.shift(); if (tapTimes.length > 1) { let avg = (tapTimes[tapTimes.length-1] - tapTimes[0]) / (tapTimes.length - 1); document.getElementById('bpm-val').innerText = (60000 / avg).toFixed(1); } }
    let tapTimes = [];
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') { e.preventDefault(); tapBpm(); } });
    renderTable();
</script>
